version: "3.8"

services:
  # 1. База данных MySQL
  db:
    image: mysql:8.0
    container_name: museum-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: museum_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # Сохраняем данные БД на жесткий диск

  # 2. Бэкенд на Go
  backend:
    build:
      context: ./backend
    container_name: museum-backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      # Обрати внимание: tcp(db:3306) — бэкенд сам найдет контейнер базы по его имени "db"!
      - DB_DSN=root:123456@tcp(db:3306)/museum_db
      - PORT=8081
      - ADMIN_SECRET=super-museum-secret
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - db # Ждем запуска базы перед стартом бэкенда

  # 3. Фронтенд на React + Nginx
  frontend:
    build:
      context: ./frontend
    container_name: museum-frontend
    restart: always
    ports:
      - "3000:80" # Внешний порт 3000 смотрит на внутренний 80 (Nginx)
    depends_on:
      - backend

volumes:
  db_data: # Объявляем хранилище для базы данных
